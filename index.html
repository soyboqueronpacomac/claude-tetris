<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="title-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-toggle" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle" />
        <span class="track"><span class="thumb"></span></span>
      </label>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section" id="timer-section">
          <span class="label">TIEMPO</span>
          <span class="value" id="timer">0:00.0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">ENERGY</span>
          <div class="energy-bar-container">
            <div id="energy-bar-fill"></div>
          </div>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
            <li><kbd>E</kbd> habilidades</li>
            <li><kbd>1</kbd>–<kbd>5</kbd> elegir</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="mode-select" class="overlay">
      <div class="overlay-box mode-select-box">
        <p class="game-title">TETRIS</p>
        <p class="mode-select-subtitle">Elegí un modo de juego</p>
        <div class="mode-grid">
          <button class="mode-btn" data-mode="classic">
            <span class="mode-name">Classic</span>
            <span class="mode-desc">Sin límites</span>
          </button>
          <button class="mode-btn" data-mode="sprint">
            <span class="mode-name">Sprint</span>
            <span class="mode-desc">40 líneas</span>
          </button>
          <button class="mode-btn" data-mode="ultra">
            <span class="mode-name">Ultra</span>
            <span class="mode-desc">2 minutos</span>
          </button>
          <button class="mode-btn" data-mode="zen">
            <span class="mode-name">Zen</span>
            <span class="mode-desc">Sin Game Over</span>
          </button>
        </div>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
        <button id="mode-change-btn" class="mode-change-link">Cambiar modo</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
